<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/etteum.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Etteum Dashboard</title>
    <script>
      // No-flash theme: apply the saved theme before first paint. Dark is default.
      (function () {
        try {
          var t = localStorage.getItem("poolprox-theme");
          if (t === "light") document.documentElement.classList.add("light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
